<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Social Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(160deg, #bb1a1a, #a48bd6);
      --card-bg: rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { min-height: 100%; width: 100%; }
    
    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      background: var(--bg-gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
      overflow-x: hidden;
      transition: background 0.8s ease;
    }
    
    .capture-area {
      padding: 30px;
      border-radius: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      width: 100%;
      max-width: 480px;
    }

    .card {
      width: 100%;
      background: var(--card-bg); 
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 30px 28px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      position: relative;
      transition: background 0.8s ease;
    }
    
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
    
    .user-badge {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      display: none; 
      margin-top: 2px;
    }

    .subtitle { 
      font-size: 0.85rem; 
      opacity: 0.6; 
      margin-bottom: 25px; 
      line-height: 1.3;
      text-align: center;
    }
    
    .input-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      outline: none;
    }
    
    .btn-container {
      display: flex;
      gap: 10px;
      margin-top: 5px;
      margin-bottom: 25px;
    }

    button { 
      flex: 2;
      padding: 16px; 
      border-radius: 18px; 
      font-size: 0.95rem; 
      font-weight: 700; 
      background: #ffffff; 
      color: #1a1a1a; 
      text-transform: uppercase; 
      border: none; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
      cursor: pointer; 
      transition: transform 0.1s ease;
    }
    button:active { transform: scale(0.98); }

    .download-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 0.85rem;
    }
    
    .gauge-block { margin-bottom: 20px; }
    .gauge-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    
    .custom-progress-bar {
      width: 100%;
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    
    .custom-progress-fill {
      height: 100%;
      width: 0%; 
      background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.85));
      border-radius: 10px;
      transition: width 0.5s ease-out;
    }

    .weather-container {
      margin-top: 25px;
      background: rgba(0, 0, 0, 0.2);
      padding: 22px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }
    .weather-emoji {
      font-size: 3.8rem;
      line-height: 1;
      display: inline-block;
    }
    .progress-text { margin-top: 25px; font-size: 0.75rem; font-style: italic; opacity: 0.6; text-align: center; display: block; }

    @media (max-width: 480px) {
      .capture-area {
        padding: 15px;
      }
      .card {
        padding: 25px 16px;
      }
      .gauge-label {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>

  <div class="capture-area" id="export-zone">
    <div class="card" id="actual-card">
      <div class="card-header">
        <h1>Social Weather</h1>
        <div class="user-badge" id="card-user-display">@username</div>
      </div>
      <div class="subtitle" id="current-date">DAILY REPORT</div>

      <div class="input-group" data-html2canvas-ignore="true">
        <label for="username">Enter your handle</label>
        <input type="text" id="username" placeholder="@username" autocomplete="off" max="30">
      </div>
      
      <div class="btn-container">
        <button id="generate-btn" onclick="updateHoroscope()" data-html2canvas-ignore="true">Analyse</button>
        <button id="download-btn" class="download-btn" onclick="downloadCard()" data-html2canvas-ignore="true">Save</button>
      </div>

      <div class="gauges-list">
        <div class="gauge-block">
          <div class="gauge-label">
            <span>Instant Blocking Potential</span>
            <span id="score-blocking">0%</span>
          </div>
          <div class="custom-progress-bar">
            <div class="custom-progress-fill" id="bar-blocking"></div>
          </div>
        </div>

        <div class="gauge-block">
          <div class="gauge-label">
            <span>Algorithm Chemistry Score</span>
            <span id="score-chemistry">0%</span>
          </div>
          <div class="custom-progress-bar">
            <div class="custom-progress-fill" id="bar-chemistry"></div>
          </div>
        </div>

        <div class="gauge-block">
          <div class="gauge-label">
            <span>Shitpost Greenlight Level</span>
            <span id="score-shitpost">0%</span>
          </div>
          <div class="custom-progress-bar">
            <div class="custom-progress-fill" id="bar-shitpost"></div>
          </div>
        </div>
      </div>

      <div class="weather-container">
        <div class="weather-emoji" id="weather-display">☁️</div>
      </div>

      <span class="progress-text">What's the weather like today? Resets daily.</span>
    </div>
  </div>

  <script>
    try {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const dateEl = document.getElementById('current-date');
      if(dateEl) {
        dateEl.innerText = new Date().toLocaleDateString('en-US', options).toUpperCase();
      }
    } catch(e) { console.log("Date error ignored."); }

    const sortedWeather = ['⛈️', '🌩️', '🌧️', '🌦️', '☁️', '🌥️', '🌤️', '⛅', '☀️'];

    const weatherThemes = {
      '⛈️': { bg: 'linear-gradient(160deg, #1d1f21, #434853)', card: 'rgba(0, 0, 0, 0.4)' },
      '🌩️': { bg: 'linear-gradient(160deg, #2c1a4d, #6c3483)', card: 'rgba(0, 0, 0, 0.28)' },
      '🌧️': { bg: 'linear-gradient(160deg, #203a43, #2c5364)', card: 'rgba(0, 0, 0, 0.25)' },
      '🌦️': { bg: 'linear-gradient(160deg, #3a6073, #3a7bd5)', card: 'rgba(0, 0, 0, 0.25)' },
      '☁️': { bg: 'linear-gradient(160deg, #616161, #9bc5c3)', card: 'rgba(0, 0, 0, 0.25)' },
      '🌥️': { bg: 'linear-gradient(160deg, #e65c00, #f9d423)', card: 'rgba(0, 0, 0, 0.28)' },
      '🌤️': { bg: 'linear-gradient(160deg, #11998e, #38ef7d)', card: 'rgba(0, 0, 0, 0.25)' },
      '⛅': { bg: 'linear-gradient(160deg, #4a00e0, #8e2de2)', card: 'rgba(0, 0, 0, 0.25)' },
      '☀️': { bg: 'linear-gradient(160deg, #ff4e50, #f9d423)', card: 'rgba(0, 0, 0, 0.28)' }
    };

    let currentUsername = "";

    function generateScore(str, seed) {
      let hash = 0;
      const combinedStr = str.toLowerCase().trim() + seed + new Date().getDate();
      for (let i = 0; i < combinedStr.length; i++) {
        hash = combinedStr.charCodeAt(i) + ((hash << 5) - hash);
      }
      return Math.abs(hash % 101);
    }

    function updateHoroscope() {
      const inputEl = document.getElementById('username');
      if (!inputEl) return;

      let username = inputEl.value.trim();
      if (!username) {
        alert("Please enter a username first!");
        return;
      }

      if (!username.startsWith('@')) username = '@' + username;
      currentUsername = username;

      const badge = document.getElementById('card-user-display');
      badge.innerText = username;
      badge.style.display = 'block';

      const blockingScore = generateScore(username, 'block');
      const chemistryScore = generateScore(username, 'chem');
      const shitpostScore = generateScore(username, 'shit');

      document.getElementById('score-blocking').innerText = blockingScore + '%';
      document.getElementById('score-chemistry').innerText = chemistryScore + '%';
      document.getElementById('score-shitpost').innerText = shitpostScore + '%';

      document.getElementById('bar-blocking').style.width = blockingScore + '%';
      document.getElementById('bar-chemistry').style.width = chemistryScore + '%';
      document.getElementById('bar-shitpost').style.width = shitpostScore + '%';

      const positiveAverage = (chemistryScore + shitpostScore) / 2;
      let rawMood = (positiveAverage - blockingScore) * 1.7;

      let emojiIndex = Math.floor(((rawMood + 100) / 200) * sortedWeather.length);
      if (emojiIndex < 0) emojiIndex = 0;
      if (emojiIndex >= sortedWeather.length) emojiIndex = sortedWeather.length - 1;

      const selectedEmoji = sortedWeather[emojiIndex];
      document.getElementById('weather-display').innerText = selectedEmoji;

      const theme = weatherThemes[selectedEmoji];
      if (theme) {
        document.documentElement.style.setProperty('--bg-gradient', theme.bg);
        document.documentElement.style.setProperty('--card-bg', theme.card);
      }
    }

   function downloadCard() {
  if (!currentUsername) {
    alert("Please run an analysis first before saving your card!");
    return;
  }

  const originalZone = document.getElementById('export-zone');
  const currentBg = getComputedStyle(document.body).backgroundImage;

  const clone = originalZone.cloneNode(true);
  
  clone.style.padding = '0px';
  clone.style.margin = '0px';
  clone.style.width = '100%';
  clone.style.maxWidth = '100%';
  clone.style.background = 'transparent';

  const clonedTitle = clone.querySelector('h1');
  if (clonedTitle) clonedTitle.style.fontSize = '2rem';

  const clonedBadge = clone.querySelector('.user-badge');
  if (clonedBadge) clonedBadge.style.fontSize = '1.3rem';

  const clonedLabels = clone.querySelectorAll('.gauge-label');
  clonedLabels.forEach(label => {
    label.style.fontSize = '1.1rem';
  });

  const clonedSub = clone.querySelector('.subtitle');
  if (clonedSub) clonedSub.style.fontSize = '1rem';

  const clonedFooter = clone.querySelector('.progress-text');
  if (clonedFooter) clonedFooter.style.fontSize = '0.95rem';


  const container = document.createElement('div');
  container.style.position = 'absolute';
  container.style.top = '-9999px';
  container.style.left = '-9999px';
  container.style.width = '450px';
  container.style.height = 'auto';
  container.style.background = currentBg;
  container.style.borderRadius = '28px';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.padding = '40px 25px 40px 25px';

  container.appendChild(clone);
  document.body.appendChild(container);

  setTimeout(() => {
    html2canvas(container, {
      scale: 2,
      backgroundColor: null, 
      useCORS: true,
      width: 450,
      height: 720
    }).then(canvas => {
      document.body.removeChild(container);

      const link = document.createElement('a');
      const cleanName = currentUsername.replace('@', '');
      link.download = `social-weather-${cleanName}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).catch(err => {
      console.error("Export failure:", err);
      if (document.body.contains(container)) {
        document.body.removeChild(container);
      }
      alert("Oops, couldn't generate the image file. Try again!");
    });
  }, 50);
}

    setTimeout(() => {
      const inputEl = document.getElementById('username');
      if(inputEl) {
        inputEl.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') updateHoroscope();
        });
      }
    }, 100);
  </script>
</body>
</html>
